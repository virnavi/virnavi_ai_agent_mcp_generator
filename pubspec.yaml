version: 0.0.3
repository: https://github.com/virnavi/virnavi_ai_agent_mcp_generator
issue_tracker: https://github.com/virnavi/virnavi_ai_agent_mcp_generator/issues

topics:
  - mcp
  - ai
  - agent
  - code-generation
  - build-runner

environment:
  sdk: ^3.9.0

dependencies:
  analyzer: ^10.0.1
  build: ^4.0.4
  glob: ^2.1.0
  json_annotation: ^4.9.0
  source_gen: ^4.2.0
  virnavi_ai_agent_mcp: ^0.0.3

dev_dependencies:
  build_runner: ^2.4.0
  build_test: ^3.5.10
  test: ^1.24.0
